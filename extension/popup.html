<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RoastMyWork</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand-mark">R</div>
        <div>
          <h1>RoastMyWork</h1>
          <p id="statusText">Career tools for this page</p>
        </div>
        <button id="settingsButton" class="icon-button" type="button" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2a2 2 0 1 1-4 0V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 1 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H2.8a2 2 0 1 1 0-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 1 1 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3h.1a1.7 1.7 0 0 0 1-1.6v-.2a2 2 0 1 1 4 0V3a1.7 1.7 0 0 0 1 1.6h.1a1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 1 1 20 7l-.1.1a1.7 1.7 0 0 0-.3 1.9v.1a1.7 1.7 0 0 0 1.6 1h.2a2 2 0 1 1 0 4h-.2a1.7 1.7 0 0 0-1.8.9Z"/></svg>
        </button>
      </header>

      <section id="settingsPanel" class="panel hidden">
        <label class="field-label" for="apiBase">API base URL</label>
        <div class="row">
          <input id="apiBase" type="url" placeholder="http://localhost:8000/api">
          <button id="saveSettings" class="secondary-button" type="button">Save</button>
        </div>
        <p class="hint">Use the backend `/api` URL. Production can be changed after deployment.</p>
      </section>

      <section id="authPanel" class="panel">
        <div id="signedOut">
          <p class="panel-title">Sign in for saved tools</p>
          <input id="username" type="text" autocomplete="username" placeholder="Username">
          <input id="password" type="password" autocomplete="current-password" placeholder="Password">
          <button id="loginButton" class="primary-button" type="button">Sign in</button>
          <p class="hint">Public chat works without signing in. Outreach generation uses your credits.</p>
        </div>
        <div id="signedIn" class="hidden">
          <div>
            <p class="panel-title">Signed in</p>
            <p id="userLine" class="hint"></p>
          </div>
          <button id="logoutButton" class="secondary-button" type="button">Sign out</button>
        </div>
      </section>

      <section class="panel context-panel">
        <div class="panel-heading">
          <p class="panel-title">Page context</p>
          <button id="refreshContext" class="text-button" type="button">Refresh</button>
        </div>
        <p id="pageTitle" class="page-title">No page captured yet</p>
        <textarea id="contextText" rows="6" placeholder="Select text on a page, right-click RoastMyWork, or capture the current page."></textarea>
      </section>

      <section class="actions">
        <button id="captureButton" class="secondary-button" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 3h6v6"/><path d="M21 3 14 10"/><path d="M9 21H3v-6"/><path d="m3 21 7-7"/></svg>
          Capture page
        </button>
        <button id="chatButton" class="primary-button" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v8Z"/></svg>
          Ask assistant
        </button>
        <button id="outreachButton" class="primary-button dark" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4 20-7Z"/></svg>
          Build outreach
        </button>
      </section>

      <section id="resultPanel" class="panel result-panel hidden">
        <div class="panel-heading">
          <p id="resultTitle" class="panel-title">Result</p>
          <button id="copyResult" class="text-button" type="button">Copy</button>
        </div>
        <div id="resultContent"></div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
