services:
  - type: web
    name: roastmywork-backend
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn roastmywork.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DJANGO_DEBUG
        value: "False"
    autoDeploy: false
